<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ghost Sub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header img { width: 24px; height: 24px; border-radius: 6px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header span { font-size: 10px; color: #888; margin-left: auto; }

    .card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .detected-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .detected-meta { font-size: 11px; color: #666; }
    .detected-price { font-size: 20px; font-weight: 700; margin: 8px 0; }
    .detected-domain { font-size: 10px; color: #999; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #1a1a1a; color: white; }
    .btn-secondary { background: #f0f0f0; color: #1a1a1a; margin-top: 8px; }

    .status { font-size: 11px; color: #666; text-align: center; margin-top: 8px; }
    .status.error { color: #dc2626; }
    .status.success { color: #16a34a; }

    .login-section { text-align: center; }
    .login-section p { font-size: 11px; color: #666; margin-bottom: 8px; }
    .login-section input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      margin-bottom: 8px;
    }

    .empty { text-align: center; padding: 20px 0; }
    .empty p { font-size: 12px; color: #888; }
    .empty .hint { font-size: 10px; color: #aaa; margin-top: 6px; }

    .tag {
      display: inline-block;
      background: #f0f0f0;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 9px;
      color: #666;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="Logo">
    <h1>Ghost Sub</h1>
    <span>by BLISS</span>
  </div>

  <div id="content"></div>

  <script src="popup.js"></script>
</body>
</html>
